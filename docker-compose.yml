version: '3.8'

services:
  db:
    build: ./database
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bridge_network

  api:
    build: ./backend
    container_name: backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-trafficway}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend/backend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bridge_network

  server:
    build: .
    container_name: server
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bridge_network

volumes:
  postgres_data:

networks:
  bridge_network:
    driver: bridge
