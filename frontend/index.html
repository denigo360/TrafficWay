<!DOCTYPE html>
<html>
    <head>
        <title>Test Page</title>
    </head>
    <body>
        <button onclick="callAPI()">Analyze Local Pcap</button>
        <div id="result"></div>

        <script>
            function callAPI() {
           fetch('/api/analyze_local_pcap', {method: "post"})
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('result').innerHTML = JSON.stringify(data);
                    });
            }
        </script>
    </body>
</html>
